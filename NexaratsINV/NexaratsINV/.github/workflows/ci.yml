name: NSE CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Stage 1: Analyze & Test ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install INV Backend Dependencies
        run: |
          cd backend
          npm install
          npm run build

      - name: Install INV Frontend Dependencies
        run: |
          cd frontend
          npm install
          npm run build

  # --- Stage 2: Build & Push Images ---
  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: nexarats/backend:latest

      - name: Build and Push WhatsApp Service
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp/whatsapp
          push: true
          tags: nexarats/whatsapp:latest
